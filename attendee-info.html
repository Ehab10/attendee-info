<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendee Information</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .text-gray-900 {
            text-align: center;
        }
        
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            min-h-screen;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

    <div id="loadingCard" class="w-full max-w-md bg-white rounded-2xl shadow-lg p-8 text-center">
        <div class="spinner mx-auto mb-4"></div>
        <p class="text-gray-600">Loading attendee data...</p>
    </div>

    <div id="infoCard" class="w-full max-w-md bg-white rounded-2xl shadow-lg p-8 transition-opacity duration-500 opacity-0 hidden">
        <div class="text-center mb-6">
            <img id="avatar" class="w-24 h-24 rounded-full mx-auto mb-4 border-4 border-white shadow-md" src="https://placehold.co/96x96/E2E8F0/4A5568?text=👤" alt="Avatar">
            <h1 id="name" class="text-3xl font-bold text-gray-800"></h1>
            <div class="flex items-center justify-center gap-2">
                <p id="team" class="text-lg text-indigo-600 font-semibold"></p>
            </div>
        </div>

        <div class="space-y-4 text-gray-700">
            <div class="flex items-center p-3 bg-gray-50 rounded-lg">
                <span class="font-bold w-32">Room No:</span>
                <span id="roomNo" class="font-mono text-gray-900"></span>
            </div>
            <div class="flex items-center p-3 bg-gray-50 rounded-lg">
                <span class="font-bold w-32">Bus No:</span>
                <span id="busNo" class="font-mono text-gray-900"></span>
            </div>
            <div class="flex items-center p-3 bg-gray-50 rounded-lg">
                <span class="font-bold w-32">Bus Leader:</span>
                <span id="busLeader" class="font-mono text-gray-900"></span>
                <a id="busLeaderPhoneLink" href="#" class="text-blue-500 hover:text-blue-600 transition-colors duration-200" style="margin: 0px 20px;">
                    <i class="fas fa-phone text-xl"></i>
                </a>
            </div>
            <div class="flex items-center p-3 bg-gray-50 rounded-lg">
                <span class="font-bold w-32">Team Leader:</span>
                <span id="teamLeader" class="font-mono text-gray-900"></span>
                <a id="teamLeaderPhoneLink" href="#" class="text-blue-500 hover:text-blue-600 transition-colors duration-200" style="margin: 0px 20px;">
                    <i class="fas fa-phone text-xl"></i>
                </a>
            </div>
            <div class="flex items-center p-3 bg-gray-50 rounded-lg">
                <span class="font-bold w-32">Quiet Time:</span>
                <span id="quietTimeLeader" class="text-gray-900 mr-2"></span>
                <a id="quietTimeLeaderPhoneLink" href="#" class="text-blue-500 hover:text-blue-600 transition-colors duration-200" style="margin: 0px 20px;">
                    <i class="fas fa-phone text-xl"></i>
                </a>
            </div>
        </div>

        <div class="mt-6 text-center">
            <button onclick="refreshData()" class="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition-colors">
                <i class="fas fa-sync-alt mr-2"></i> Refresh Data
            </button>
        </div>
    </div>

    <div id="notFoundCard" class="w-full max-w-md bg-white rounded-2xl shadow-lg p-8 text-center hidden">
        <h1 class="text-2xl font-bold text-red-600">Attendee Not Found</h1>
        <p class="text-gray-600 mt-2">Please check the ID in the URL and try again.</p>
    </div>

    <script>
        // Configuration
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxd27kupyQPSX2w4DxHDiW3TedbCfoosY-KO5BETlfdZXUmDK1HB-r71_k_rIDuIf6zXQ/exec";
        const CACHE_KEY = "attendeeDataCache";
        const CACHE_EXPIRY_MINUTES = 60;

        let peopleData = {};

        // Load data on page load
        document.addEventListener("DOMContentLoaded", async () => {
            await loadPeopleData();
            displayAttendee();
        });

        function loadPeopleDataJSONP() {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                const callbackName = 'jsonpCallback_' + Date.now();
                
                // Define the callback function
                window[callbackName] = function(data) {
                    // Clean up
                    delete window[callbackName];
                    document.body.removeChild(script);
                    
                    if (data.error) {
                        reject(new Error(data.error));
                    } else {
                        resolve(data);
                    }
                };
                
                script.src = APPS_SCRIPT_URL + '?callback=' + callbackName;
                script.onerror = function() {
                    delete window[callbackName];
                    document.body.removeChild(script);
                    reject(new Error('JSONP request failed'));
                };
                
                document.body.appendChild(script);
            });
        }

        async function loadData() {
          try {
            const response = await fetch(APPS_SCRIPT_URL);
            
            if (!response.ok) {
              throw new Error('Network response was not ok');
            }
        
            const data = await response.json();
            // console.log("Success:", data);
            return data;
            // Handle your attendee info here
          } catch (error) {
            console.error("Fetch error:", error);
          }
        }

        async function loadPeopleData() {
            try {
                // Check if data is cached and not expired
                const cached = localStorage.getItem(CACHE_KEY);
                if (cached) {
                    const { data, timestamp } = JSON.parse(cached);
                    const ageMinutes = (Date.now() - timestamp) / 60000;
                    
                    if (ageMinutes < CACHE_EXPIRY_MINUTES) {
                        peopleData = data;
                        console.log("✓ Loaded data from cache");
                        return;
                    }
                }

                // Fetch fresh data from Apps Script using JSONP
                console.log("↻ Fetching data from Apps Script...");
                const data = await loadData();
                
                peopleData = data;

                // Cache the data
                localStorage.setItem(CACHE_KEY, JSON.stringify({
                    data: peopleData,
                    timestamp: Date.now()
                }));

                console.log(`✓ Loaded ${Object.keys(peopleData).length} attendees from Apps Script`);
            } catch (error) {
                console.error("✗ Error loading data:", error);
                
                // Try to use cached data even if expired
                const cached = localStorage.getItem(CACHE_KEY);
                if (cached) {
                    const { data } = JSON.parse(cached);
                    peopleData = data;
                    console.warn("⚠ Using expired cache due to fetch error");
                    return;
                }

                showNotFound();
            }
        }

        function displayAttendee() {
            // Hide loading card
            document.getElementById("loadingCard").classList.add("hidden");

            // Get ID from URL
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get("id");

            if (!id) {
                showNotFound();
                return;
            }

            // Hash the ID
            const hash = CryptoJS.SHA256(id).toString();
            // console.log("hash "+hash);

            // Find attendee
            const attendee = peopleData[hash];
            // console.log("peopleData "+peopleData);
            // console.log("attendee "+attendee);

            if (!attendee) {
                showNotFound();
                return;
            }

            // Populate card
            document.getElementById("name").textContent = attendee.name;
            document.getElementById("roomNo").textContent = attendee.roomNo;
            document.getElementById("busNo").textContent = attendee.busNo;
            document.getElementById("busLeader").textContent = attendee.busLeader;
            document.getElementById("team").textContent = `Team ${attendee.team}`;
            document.getElementById("teamLeader").textContent = attendee.teamLeader;
            document.getElementById("quietTimeLeader").textContent = attendee.quietTimeLeader;
            document.getElementById("avatar").src = attendee.avatar;

            // Set phone links
            setupPhoneLink("busLeaderPhoneLink", attendee.busLeaderPhone);
            setupPhoneLink("teamLeaderPhoneLink", attendee.teamLeaderPhone);
            setupPhoneLink("quietTimeLeaderPhoneLink", attendee.quietTimeLeaderPhone);

            // Show card
            const card = document.getElementById("infoCard");
            card.classList.remove("hidden");
            setTimeout(() => card.classList.remove("opacity-0"), 10);
        }

        function setupPhoneLink(elementId, phone) {
            const element = document.getElementById(elementId);
            if (phone && phone !== "") {
                element.href = `tel:+20${phone}`;
                element.style.display = "inline-block";
            } else {
                element.style.display = "none";
            }
        }

        function showNotFound() {
            document.getElementById("loadingCard").classList.add("hidden");
            document.getElementById("notFoundCard").classList.remove("hidden");
        }

        async function refreshData() {
            const btn = event.target.closest("button");
            const originalHTML = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Refreshing...';

            try {
                // Clear cache
                localStorage.removeItem(CACHE_KEY);

                // Reload data
                await loadPeopleData();
                displayAttendee();
                
                console.log("✓ Data refreshed successfully");
            } catch (error) {
                console.error("✗ Refresh failed:", error);
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalHTML;
            }
        }

        // // Optional: Refresh data every 60 minutes
        // setInterval(() => {
        //     loadPeopleData().then(() => {
        //         console.log("↻ Auto-refreshed data");
        //         displayAttendee();
        //     }).catch(err => console.error("Auto-refresh failed:", err));
        // }, 60 * 60 * 1000);
    </script>
</body>
</html>
